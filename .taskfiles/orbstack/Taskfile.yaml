# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

tasks:
  remove-cluster:
    desc: Reset the orbstack cluster
    silent: true
    cmd: |
      echo "🧼 Deleting Kubernetes cluster in OrbStack..."
      orb stop k8s || true
      orb delete k8s -f || true

  start-cluster:
    desc: Reset the orbstack cluster
    silent: true
    internal: true
    cmd: |
      echo "🧼 Starting cluster in orb stack..."
      orb start || true
      orb start k8s
      until kubectl get nodes --no-headers | grep -q " Ready"; do sleep 1; done
      echo "✅ Kube API is up"

  reset-cluster:
    desc: Delete the cluster, then start a new one.
    cmds:
      - task: remove-cluster
      - task: start-cluster
